# Docker Compose — Chess AI Project
# Chạy toàn bộ bằng 1 lệnh: docker-compose up --build

services:
  # ============================================
  # Backend — Python Flask (port 8080)
  # ============================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app/backend
      - ./ai_core:/app/ai_core
      - ./benchmark_results.csv:/app/benchmark_results.csv
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - PYTHONPATH=/app
    command: python -m backend.app

  # ============================================
  # Frontend — React Vite (port 3000)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - VITE_API_URL=http://backend:8080
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 3000
